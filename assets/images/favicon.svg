<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="股神修練院">
  <title>股神修練院</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1322"/>
      <stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d290"/>
      <stop offset="0.55" stop-color="#e2c079"/>
      <stop offset="1" stop-color="#c79c4f"/>
    </linearGradient>
  </defs>

  <!-- Dark academy plaque -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25"
        fill="none" stroke="#e2c079" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Soft top bloom -->
  <ellipse cx="32" cy="14" rx="22" ry="11" fill="#e2c079" opacity="0.12"/>

  <!-- Ascending candlestick crest: chart + academy mark -->
  <g stroke="url(#gold)" stroke-width="3" stroke-linecap="round">
    <line x1="19" y1="40" x2="19" y2="50"/>
    <line x1="32" y1="26" x2="32" y2="44"/>
    <line x1="45" y1="16" x2="45" y2="38"/>
  </g>
  <g fill="url(#gold)">
    <rect x="15" y="40" width="8" height="12" rx="2"/>
    <rect x="28" y="29" width="8" height="14" rx="2"/>
    <rect x="41" y="20" width="8" height="15" rx="2"/>
  </g>
  <!-- Baseline -->
  <line x1="14" y1="54" x2="50" y2="54" stroke="#e2c079" stroke-opacity="0.45"
        stroke-width="2" stroke-linecap="round"/>
</svg>
